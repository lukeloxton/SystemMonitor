name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: |
          swift build -c release
          BINARY="$(swift build -c release --show-bin-path)/SystemMonitor"
          mkdir -p "System Monitor.app/Contents/MacOS"
          mkdir -p "System Monitor.app/Contents/Resources"
          cp "$BINARY" "System Monitor.app/Contents/MacOS/SystemMonitor"
          cp Info.plist "System Monitor.app/Contents/"
          cp AppIcon.icns "System Monitor.app/Contents/Resources/"
          ditto -c -k --sequesterRsrc --keepParent "System Monitor.app" "SystemMonitor.app.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: SystemMonitor.app.zip
          generate_release_notes: true
